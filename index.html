        let currentQueue = [];

        // 初始化遊戲
        function initGame() {
            currentQueue = questions.map((_, i) => i);
            startRound();
        }

        function startRound() {
            currentIdxInQueue = 0;
            wrongQueue = [];
            correctCountInRound = 0;

            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('review-list-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');

            if (currentQueue.length < questions.length) {
                document.getElementById('review-badge').classList.remove('hidden');
            } else {
                document.getElementById('review-badge').classList.add('hidden');
            }

            document.getElementById('round-total').innerText = currentQueue.length;
            loadQuestion();
        }

        function loadQuestion() {
            if (currentIdxInQueue >= currentQueue.length) {
                showRoundResult();
                return;
            }

            const realQIdx = currentQueue[currentIdxInQueue];
            const q = questions[realQIdx];

            document.getElementById('current-count').innerText = currentIdxInQueue + 1;
            document.getElementById('question').innerText = q.q;

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            document.getElementById('result').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');

            q.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 rounded-xl border-2 border-gray-100 hover:border-blue-500 transition-all text-gray-700 font-medium bg-gray-50";
                const prefix = ['A.', 'B.', 'C.', 'D.'][i];
                btn.innerText = `${prefix} ${opt}`;
                btn.onclick = () => checkAnswer(i, btn, realQIdx);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(selectedIdx, clickedBtn, realQIdx) {
            if (!document.getElementById('result').classList.contains('hidden')) return;

            const correctIdx = questions[realQIdx].a;
            const res = document.getElementById('result');

            res.classList.remove('hidden');

            if (selectedIdx === correctIdx) {
                res.innerText = "✅ 答對了！";
                res.className = "mt-6 p-4 rounded-xl text-center font-bold bg-green-100 text-green-700";
                clickedBtn.classList.replace('border-gray-100', 'border-green-500');
                clickedBtn.classList.replace('bg-gray-50', 'bg-green-50');
                correctCountInRound++;
            } else {
                const correctText = questions[realQIdx].o[correctIdx];
                const prefix = ['A.', 'B.', 'C.', 'D.'][correctIdx];
                res.innerText = `❌ 答錯了！正確答案是：\n${prefix} ${correctText}`;
                res.className = "mt-6 p-4 rounded-xl text-center font-bold bg-red-100 text-red-700";
                clickedBtn.classList.replace('border-gray-100', 'border-red-500');
                clickedBtn.classList.replace('bg-gray-50', 'bg-red-50');

                allBtns[correctIdx].classList.replace('border-gray-100', 'border-green-500');
                allBtns[correctIdx].classList.replace('bg-gray-50', 'bg-green-50');

                // 記下錯題
                wrongQueue.push(realQIdx);
            }

            let nextBtn = document.getElementById('next-btn');
            if (currentIdxInQueue === currentQueue.length - 1) {
                nextBtn.innerText = "查看結果報表";
                nextBtn.classList.replace('bg-gray-800', 'bg-blue-600');
                nextBtn.classList.replace('hover:bg-gray-700', 'hover:bg-blue-700');
            } else {
                nextBtn.innerText = "下一題";
                nextBtn.classList.replace('bg-blue-600', 'bg-gray-800');
                nextBtn.classList.replace('hover:bg-blue-700', 'hover:bg-gray-700');
            }
            nextBtn.classList.remove('hidden');
        }

        function showRoundResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            let total = currentQueue.length;
            let accuracy = Math.round((correctCountInRound / total) * 100);

            document.getElementById('accuracy-rate').innerText = accuracy;
            document.getElementById('correct-count').innerText = correctCountInRound;
            document.getElementById('wrong-count').innerText = wrongQueue.length;

            let actionBtn = document.getElementById('action-btn');

            if (wrongQueue.length === 0) {
                // 全部答對
                document.getElementById('result-title').innerText = "太神啦！全數通關！";
                document.getElementById('result-emoji').innerText = "🏆";
                actionBtn.innerText = "重新開始全部挑戰";
                actionBtn.classList.replace('bg-blue-600', 'bg-green-600');
                actionBtn.classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
                actionBtn.onclick = () => {
                    initGame();
                };
            } else {
                // 有錯題 -> 進入錯題總覽
                document.getElementById('result-title').innerText = "本輪結束！";
                document.getElementById('result-emoji').innerText = "💪";
                actionBtn.innerText = `查看 ${wrongQueue.length} 題錯題清單`;
                actionBtn.classList.replace('bg-green-600', 'bg-blue-600');
                actionBtn.classList.replace('hover:bg-green-700', 'hover:bg-blue-700');
                
                // 點擊後執行 showReviewList 函數
                actionBtn.onclick = () => {
                    showReviewList();
                };
            }
        }

        // 產生並顯示錯題清單
        function showReviewList() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('review-list-screen').classList.remove('hidden');
            document.getElementById('review-list-screen').classList.add('flex'); // 確保 flex 排版生效

            document.getElementById('review-list-count').innerText = `共 ${wrongQueue.length} 題`;
            
            const container = document.getElementById('wrong-list-container');
            container.innerHTML = ''; // 清空上次的紀錄

            // 迴圈把錯題印出來
            wrongQueue.forEach((qIdx, index) => {
                const q = questions[qIdx];
                const correctAnsText = q.o[q.a];
                const prefix = ['A.', 'B.', 'C.', 'D.'][q.a];

                const itemDiv = document.createElement('div');
                itemDiv.className = "bg-white p-4 rounded-xl border-2 border-red-100 shadow-sm";
                itemDiv.innerHTML = `
                    <div class="text-xs text-red-400 font-bold mb-1">第 ${index + 1} 題</div>
                    <div class="font-semibold text-gray-800 mb-3 text-sm leading-relaxed">${q.q}</div>
                    <div class="text-green-700 text-sm font-bold bg-green-50 p-3 rounded-lg border border-green-200">
                        ✅ 答案：${prefix} ${correctAnsText}
                    </div>
                `;
                container.appendChild(itemDiv);
            });

            // 設定進入地獄模式的按鈕
            document.getElementById('start-hell-btn').onclick = () => {
                currentQueue = [...wrongQueue];
                startRound();
            };
        }
document.getElementById('next-btn').onclick = () => {
            currentIdxInQueue++;
            loadQuestion();
        };

        // 啟動遊戲
        if(questions.length > 0) {
            initGame();
        } else {
            document.getElementById('question').innerText = "⚠️ 請先把 100 題貼進程式碼的 questions 陣列中喔！";
        }
    </script>
</body>
</html>
